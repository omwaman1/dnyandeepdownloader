<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 420px; font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; padding: 15px; margin: 0; }
        h2 { color: #e94560; font-size: 16px; margin: 0 0 12px; }
        .stats { background: #16213e; padding: 12px; border-radius: 8px; margin-bottom: 12px; text-align: center; }
        .stats .count { font-size: 36px; font-weight: bold; color: #e94560; }
        .stats .label { color: #a8d8ea; font-size: 13px; }
        .btn { background: #e94560; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%; margin-bottom: 6px; }
        .btn:hover { background: #c73e54; }
        .btn.extract { background: #27ae60; }
        .btn.extract:hover { background: #219a52; }
        .btn.secondary { background: #0f3460; }
        .btn.secondary:hover { background: #1a3a6e; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .progress-box { background: #16213e; border-radius: 8px; padding: 12px; margin-bottom: 10px; display: none; }
        .progress-bar { background: #0f3460; height: 20px; border-radius: 10px; overflow: hidden; margin: 8px 0; }
        .progress-fill { background: linear-gradient(90deg, #e94560, #27ae60); height: 100%; border-radius: 10px; transition: width 0.3s; width: 0%; }
        .progress-text { color: #a8d8ea; font-size: 12px; text-align: center; }
        .key-list { max-height: 200px; overflow-y: auto; margin: 10px 0; }
        .key-item { background: #16213e; border: 1px solid #0f3460; border-radius: 6px; padding: 6px 10px; margin-bottom: 3px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .key-item .title { color: #a8d8ea; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .key-item .key { font-family: Consolas, monospace; color: #e94560; font-size: 10px; cursor: pointer; margin-left: 6px; flex-shrink: 0; }
        .key-item .key:hover { color: #ff6b81; }
        .info { color: #555; font-size: 11px; text-align: center; padding: 8px; }
        .toast { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 8px 20px; border-radius: 6px; font-size: 13px; display: none; z-index: 100; }
    </style>
</head>
<body>
    <h2>🔑 Graphy Key Collector</h2>
    
    <div class="stats">
        <div class="count" id="count">0</div>
        <div class="label">keys captured</div>
    </div>

    <button class="btn extract" id="extractAll">🚀 Extract All Keys (Auto)</button>
    
    <div class="progress-box" id="progressBox">
        <div class="progress-text" id="progressText">Preparing...</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressDetail"></div>
    </div>

    <button class="btn" id="export">📥 Export JSON</button>
    <button class="btn secondary" id="clear">🗑️ Clear All Keys</button>
    
    <div class="key-list" id="keys"></div>
    
    <div class="info">Open a Graphy course page → click Extract All Keys</div>
    
    <div class="toast" id="toast">Copied!</div>

    <script src="popup.js"></script>
</body>
</html>
